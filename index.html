<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Geometric Alekhan Star</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  h1 {
    color: #FFD700;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
    margin-bottom: 6px;
  }

  h2 {
    color: #fff;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 2px;
    margin-bottom: 24px;
    opacity: 0.85;
  }

  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(100,200,255,0.15);
  }

  #controls {
    margin-top: 20px;
    display: flex;
    gap: 16px;
  }

  button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 8px 22px;
    border-radius: 6px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  button:hover {
    border-color: #FFD700;
    background: rgba(255,215,0,0.08);
    color: #FFD700;
  }
</style>
</head>
<body>

<h1>PYTHON</h1>
<h2>Neon Geometric Alekhan Star</h2>
<canvas id="c"></canvas>
<div id="controls">
  <button id="btnPause">⏸ إيقاف</button>
  <button id="btnReset">↺ إعادة</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SIZE = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.68, 560);
canvas.width = SIZE;
canvas.height = SIZE;

const cx = SIZE / 2;
const cy = SIZE / 2;

// Mirror the Python turtle logic:
// range(440) iterations
// h starts 0.45, increments by 0.20/200 per step, resets to 0.45 if > 0.70
// t.forward(i * 0.6) -> move outward
// t.circle(i * 0.3, 120) -> arc
// t.left(144) -> turn
// t.forward(i * 0.2)
// t.width(i/200 + 1.2)

let steps = [];
let h = 0.45;
const n = 200;

function hsvToRgb(h, s, v) {
  let r, g, b;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r=v; g=t; b=p; break;
    case 1: r=q; g=v; b=p; break;
    case 2: r=p; g=v; b=t; break;
    case 3: r=p; g=q; b=v; break;
    case 4: r=t; g=p; b=v; break;
    case 5: r=v; g=p; b=q; break;
  }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

// Pre-compute turtle path
function buildSteps() {
  steps = [];
  let px = 0, py = 0;
  let angle = 90; // turtle starts facing up
  let hue = 0.45;

  function toRad(deg) { return deg * Math.PI / 180; }

  function forward(dist) {
    px += dist * Math.cos(toRad(angle));
    py -= dist * Math.sin(toRad(angle));
  }

  function left(deg) { angle += deg; }

  function arcPath(radius, extent, color, lw) {
    // approximate arc as many tiny steps
    const segs = Math.max(4, Math.abs(Math.round(extent / 5)));
    const stepAngle = extent / segs;
    const stepLen = (2 * Math.PI * radius * Math.abs(extent) / 360) / segs;
    // turtle circles: turn left stepAngle, forward stepLen
    const pts = [];
    let ax = px, ay = py, aa = angle;
    pts.push([ax, ay]);
    for (let s = 0; s < segs; s++) {
      ax += stepLen * Math.cos(toRad(aa));
      ay -= stepLen * Math.sin(toRad(aa));
      aa += stepAngle;
      pts.push([ax, ay]);
    }
    // update global
    px = ax; py = ay; angle = aa;
    return pts;
  }

  for (let i = 0; i < 440; i++) {
    const [r, g, b] = hsvToRgb(hue, 1, 1);
    const color = `rgb(${r},${g},${b})`;
    hue += 0.20 / n;
    if (hue > 0.70) hue = 0.45;
    const lw = i / 200 + 1.2;

    // t.up(); t.forward(i*0.6); t.down()
    // lift pen, move
    const sx = px, sy = py;
    forward(i * 0.6);
    const ex = px, ey = py;

    // t.circle(i*0.3, 120)
    const pts = arcPath(i * 0.3, 120, color, lw);

    // t.left(144)
    left(144);

    // t.forward(i*0.2)
    forward(i * 0.2);

    steps.push({ color, lw, arc: pts });
  }
}

buildSteps();

// Render progressively
let frame = 0;
let paused = false;
let rafId;
const BATCH = 3; // steps per frame

// Scale to canvas
function scale(x, y) {
  const S = SIZE / 520;
  return [cx + x * S, cy + y * S];
}

ctx.fillStyle = '#000';
ctx.fillRect(0, 0, SIZE, SIZE);

function draw() {
  if (!paused) {
    for (let b = 0; b < BATCH && frame < steps.length; b++, frame++) {
      const { color, lw, arc } = steps[frame];
      if (arc.length < 2) continue;
      ctx.beginPath();
      const [sx, sy] = scale(arc[0][0], arc[0][1]);
      ctx.moveTo(sx, sy);
      for (let k = 1; k < arc.length; k++) {
        const [ax, ay] = scale(arc[k][0], arc[k][1]);
        ctx.lineTo(ax, ay);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.shadowColor = color;
      ctx.shadowBlur = 6;
      ctx.stroke();
    }
  }
  if (frame < steps.length) {
    rafId = requestAnimationFrame(draw);
  }
}

draw();

document.getElementById('btnPause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? '▶ تشغيل' : '⏸ إيقاف';
  if (!paused) {
    rafId = requestAnimationFrame(draw);
  }
});

document.getElementById('btnReset').addEventListener('click', function() {
  cancelAnimationFrame(rafId);
  paused = false;
  document.getElementById('btnPause').textContent = '⏸ إيقاف';
  frame = 0;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SIZE, SIZE);
  draw();
});
</script>
</body>
</html>
